  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2330;
      --border: #30363d;
      --accent: #f5a623;
      --accent2: #e8590c;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --green: #3fb950;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ───────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; min-height: 100dvh; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex; align-items: center; gap: 12px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: -0.02em;
      text-decoration: none;
      flex: 1;
      cursor: pointer;
    }

    .hamburger {
      display: flex; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 4px; background: none; border: none;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: all 0.25s ease;
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    /* ── DRAWER NAV ───────────────────────────────────────── */
    #drawer {
      position: fixed; inset: 56px 0 0 0; z-index: 99;
      background: var(--surface);
      border-right: 1px solid var(--border);
      width: 280px; max-width: 85vw;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto; padding: 16px 0;
    }
    #drawer.open { transform: translateX(0); }

    #drawer-backdrop {
      position: fixed; inset: 56px 0 0 0; z-index: 98;
      background: rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s ease;
    }
    #drawer-backdrop.open { opacity: 1; pointer-events: all; }

    .nav-section { padding: 4px 0; }
    .nav-label {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em;
      color: var(--text-muted); text-transform: uppercase;
      padding: 12px 20px 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px;
      color: var(--text); text-decoration: none;
      font-size: 0.9rem; cursor: pointer;
      transition: background 0.15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--surface2); }
    .nav-item.active { color: var(--accent); background: rgba(245,166,35,0.08); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }

    /* ── MAIN CONTENT ─────────────────────────────────────── */
    main { flex: 1; padding: 16px; max-width: 640px; margin: 0 auto; width: 100%; }

    .page { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── PAGE TITLE ───────────────────────────────────────── */
    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      margin-bottom: 4px;
    }
    .page-subtitle {
      color: var(--text-muted); font-size: 0.85rem;
      margin-bottom: 20px;
    }

    /* ── CARDS ────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1rem;
      margin-bottom: 6px;
    }
    .card-desc { color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; }

    /* ── VIDEO EMBED ──────────────────────────────────────── */
    .video-wrap {
      position: relative; width: 100%; padding-bottom: 56.25%;
      border-radius: var(--radius-sm); overflow: hidden;
      background: #000; margin: 12px 0;
    }
    .video-wrap iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none;
    }

    /* ── COPY BUTTON ──────────────────────────────────────── */
    .copy-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: var(--accent); color: #000;
      border: none; border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      text-decoration: none;
    }
    .copy-btn:active { transform: scale(0.97); }
    .copy-btn.copied { background: var(--green); }
    .copy-btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .copy-btn.secondary:active { background: var(--border); }

    /* ── SHAREABLE CHIP FILTERS ───────────────────────────── */
    .chip-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin: 12px 0;
    }
    .chip {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem; cursor: pointer;
      background: var(--surface2); color: var(--text-muted);
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .chip.active {
      background: var(--accent); color: #000;
      border-color: var(--accent); font-weight: 500;
    }

    /* ── SELECT ───────────────────────────────────────────── */
    .select-wrap { position: relative; margin-bottom: 12px; }
    .select-wrap select {
      width: 100%; padding: 10px 36px 10px 12px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      appearance: none; cursor: pointer;
      outline: none;
    }
    .select-wrap::after {
      content: '▾'; position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); pointer-events: none;
      color: var(--text-muted);
    }

    /* ── LINK LIST ────────────────────────────────────────── */
    .link-list { display: flex; flex-direction: column; gap: 8px; }
    .link-item {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 10px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .link-item a {
      color: var(--accent); text-decoration: none; font-size: 0.85rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .link-item a:hover { text-decoration: underline; }

    /* ── TOAST ────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; z-index: 999;
      transform: translateX(-50%) translateY(80px);
      background: var(--green); color: #000;
      padding: 10px 20px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 500;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── COLLAPSIBLE ──────────────────────────────────────── */
    .collapsible { margin-bottom: 12px; }
    .collapsible-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
      transition: background 0.15s; user-select: none;
    }
    .collapsible-header:hover { background: var(--surface2); }
    .collapsible-header .chevron {
      transition: transform 0.25s; font-size: 0.75rem; color: var(--text-muted);
    }
    .collapsible-header.open .chevron { transform: rotate(180deg); }
    .collapsible-body {
      display: none; padding: 12px 0 4px;
    }
    .collapsible-body.open { display: block; }

    /* ── VERSION ──────────────────────────────────────────── */
    .version-tag {
      text-align: center; color: var(--text-muted); font-size: 0.75rem;
      padding: 24px 0 8px;
    }

    /* ── INSTALL BANNER ───────────────────────────────────── */
    #install-banner {
      display: none;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
      margin-bottom: 16px;
      flex-direction: row; align-items: center; gap: 10px;
    }
    #install-banner.show { display: flex; }
    #install-banner p { font-size: 0.85rem; color: var(--text-muted); flex: 1; }
    #install-banner strong { color: var(--text); display: block; font-size: 0.9rem; }

    /* ── WORDS PAGE ───────────────────────────────────────── */
    .tab-row {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: var(--surface2); padding: 4px; border-radius: var(--radius-sm);
    }
    .tab-btn {
      flex: 1; padding: 8px;
      background: none; border: none; border-radius: 6px;
      color: var(--text-muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
    }
    .tab-btn.active { background: var(--surface); color: var(--text); font-weight: 500; }

    .steps { display: flex; flex-direction: column; gap: 10px; margin: 12px 0; }
    .step {
      display: flex; gap: 12px;
      padding: 10px 12px;
      background: var(--surface2); border-radius: var(--radius-sm);
      font-size: 0.88rem; line-height: 1.5;
    }
    .step-num {
      font-family: 'Syne', sans-serif; font-weight: 700;
      color: var(--accent); font-size: 0.85rem; flex-shrink: 0; padding-top: 1px;
    }
    .quote {
      background: var(--surface2); border-left: 3px solid var(--accent);
      padding: 10px 14px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-style: italic; font-size: 0.88rem; color: var(--text-muted);
      margin: 4px 0;
    }

    /* ── INPUT (PAR/Settings) ──────────────────────────────── */
    .input-field {
      width: 100%; padding: 10px 12px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.15s;
      margin-bottom: 8px;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; display: block; }

    /* ── MEMBER ID BANNER ──────────────────────────────────── */

      border: 1px solid rgba(245,166,35,0.3);

      padding: 8px 12px;
      font-size: 0.8rem; color: var(--text-muted);
      margin-bottom: 16px;
    }
    #member-banner strong { color: var(--accent); }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (min-width: 640px) {
      header { padding: 0 24px; }
      main { padding: 20px 24px; }
    }
  </style>
</head>

const hamburger = document.getElementById('hamburger');
const drawer = document.getElementById('drawer');
const backdrop = document.getElementById('drawer-backdrop');

hamburger.addEventListener('click', () => {
  const isOpen = drawer.classList.toggle('open');
  backdrop.classList.toggle('open', isOpen);
  hamburger.classList.toggle('open', isOpen);
});

function closeDrawer() {
  drawer.classList.remove('open');

// ═══════════════════════════════════════════════
// VIDEO EMBED
// ═══════════════════════════════════════════════
function videoEmbed(item) {
  if (!item) return '';
  if (item.platform === 'YouTube') {
    return `<div class="video-wrap">
      <iframe src="https://www.youtube.com/embed/${item.videoId}?rel=0" allowfullscreen loading="lazy"></iframe>
    </div>`;
  }
  if (item.platform === 'Vimeo') {
    const hash = item.videoHash ? `?h=${item.videoHash}` : '';
    return `<div class="video-wrap">
      <iframe src="https://player.vimeo.com/video/${item.videoId}${hash}" allowfullscreen loading="lazy"></iframe>
    </div>`;
  }
  if (item.platform === 'Html5' && item.videoUrl) {
    return `<div class="video-wrap">
      <video controls style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;">
        <source src="${item.videoUrl}" />Your browser does not support the video tag.
      </video>
    </div>`;
  }
  return '';
}

// ═══════════════════════════════════════════════
// COPY / TOAST
// ═══════════════════════════════════════════════
function copyText(text, label) {
  navigator.clipboard.writeText(text).then(() => {
    showToast(label || 'Copied!');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function collapsible(title, bodyHtml, startOpen = false) {
  const id = 'c_' + Math.random().toString(36).slice(2);
  return `
    <div class="collapsible">
      <div class="collapsible-header ${startOpen ? 'open' : ''}" onclick="toggleCollapsible('${id}', this)">
        <span>${title}</span>
        <span class="chevron">▾</span>
      </div>
      <div id="${id}" class="collapsible-body ${startOpen ? 'open' : ''}">${bodyHtml}</div>
    </div>`;
}

window.toggleCollapsible = function(id, header) {
  const body = document.getElementById(id);
  body.classList.toggle('open');
  header.classList.toggle('open');
};

function render() {
  const main = document.getElementById('main-content');
  switch(currentPage) {
    case 'home':       main.innerHTML = renderHome(); break;
    case 'shareables': main.innerHTML = renderShareables(); break;
    case 'words':      main.innerHTML = renderWords(); break;
    case 'settings':   main.innerHTML = renderSettings(); break;
    default:           main.innerHTML = renderHome();
  }
  // Restore active nav state
  document.querySelectorAll('.nav-item[onclick]').forEach(el => {
    const match = el.getAttribute('onclick')?.match(/navigate\('(.+?)'\)/);
    if (match) el.classList.toggle('active', match[1] === currentPage);
  });
}
